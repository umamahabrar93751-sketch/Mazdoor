<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - Mazdoor.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        .form-container {
            max-width: 600px; margin: 40px auto; padding: 32px;
            background: white; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md); border: 1px solid var(--border-color);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-dark); }
        .form-control {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border-color);
            border-radius: var(--radius-md); font-family: var(--font-main);
            font-size: 1rem; transition: border-color 0.2s;
        }
        .form-control:focus { outline: none; border-color: var(--success); box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        @media (max-width: 768px) {
            .form-container { margin: 20px; padding: 24px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar" style="position: static;">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-helmet-safety text-primary"></i>
                <span>Mazdoor.com</span>
            </a>
            <a href="employer-dashboard.html" class="btn btn-outline">Back to Dashboard</a>
        </div>
    </nav>

    <div class="form-container">
        <h2 style="margin-bottom: 8px;">Post a New Job</h2>
        <p style="margin-bottom: 24px;">Workers in your selected area will be notified instantly.</p>
        
        <form onsubmit="event.preventDefault(); window.location.href='employer-dashboard.html';">
            <div class="form-group">
                <label>Job Title</label>
                <input type="text" class="form-control" placeholder="e.g. Need 2 construction helpers" required>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Job Category</label>
                    <select class="form-control" required>
                        <option value="">Select Category...</option>
                        <option value="construction">Construction / Helper</option>
                        <option value="electrician">Electrician</option>
                        <option value="plumber">Plumber</option>
                        <option value="cleaner">Cleaner</option>
                        <option value="painter">Painter</option>
                        <option value="driver">Driver</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Workers Needed</label>
                    <input type="number" class="form-control" min="1" value="1" required>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Wage (Rs per day)</label>
                    <input type="number" class="form-control" placeholder="e.g. 1500" required>
                </div>
                
                <div class="form-group">
                    <label>Location / Area</label>
                    <input type="text" class="form-control" placeholder="e.g. DHA Phase 6, Lahore" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Job Description (Optional)</label>
                <textarea class="form-control" placeholder="Any specific tools they need to bring? Timings?"></textarea>
            </div>
            
            <button type="submit" class="btn btn-success" style="width: 100%; padding: 16px; font-size: 1.1rem; margin-top: 16px;">
                Post Job Now
            </button>
        </form>
    </div>
</body>
</html>
